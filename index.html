function enemyTurn(){if(!state.alive||state.enemy.hp<=0)return;let e=state.enemy;e.turn++;if(Math.random()<state.dodge){recoverCombatMp();addCombatLog(`🍃 ${e.name}의 공격 회피`);combatView('공격을 피했습니다! · 🔷+2');return setTimeout(()=>{state.combatBusy=false;combatView('당신의 차례')},280)}if(e.mechanic==='janitor'&&e.turn%3===0){let h=Math.round(e.max*.08);e.hp=Math.min(e.max,e.hp+h);addCombatLog(`관리인이 체력 ${h} 회복`)}if(e.mechanic==='inspector'&&e.turn===1){state.atk=Math.max(3,state.atk-2);addCombatLog('감사관의 분석: 공격력 -2')}if(e.mechanic==='manager'&&!e.enraged&&e.hp/e.max<=.5){e.enraged=true;e.atk=Math.round(e.atk*1.5);addCombatLog('오염된 지배인 광폭화!')}let incoming=Math.round(e.atk*(.8+Math.random()*.4));if(e.mechanic==='reaper'&&e.turn%3===0){incoming=Math.round(incoming*2.5);addCombatLog('층계 수확자: 처형 공격')}if(state.ironSkin>0){incoming=Math.ceil(incoming/2);state.ironSkin--}incoming=Math.max(1,incoming-state.def);sfx(e.boss?'bossAttack':'enemyAttack');damage(incoming,false);recoverCombatMp();if(state.regen)state.hp=Math.min(state.maxHp,state.hp+state.regen);addCombatLog(`${e.name}이(가) ${incoming} 데미지${state.regen?` · 재생 +${state.regen}`:''}`);if(!state.alive)return;combatView(`${e.boss?'보스':'적'} 공격!  −${incoming} · 🔷+2`);playerHitFx(incoming);setTimeout(()=>{if(!state.alive)return;state.combatBusy=false;combatView('당신의 차례')},380)}
function escape(){if(state.combatBusy)return;state.combatBusy=true;if(Math.random()<Math.min(.9,.6+state.luck*.01)){toast('도주 성공');next()}else{addCombatLog('도주 실패');combatView('도주에 실패했습니다!');setTimeout(enemyTurn,150)}}

let rewardSeq=100;
const statNames={hp:'체력',atk:'공격력',gold:'골드',luck:'행운',maxHp:'최대 체력',runGems:'보석'},statIcons={hp:'❤️',atk:'⚔️',gold:'🪙',luck:'🍀',maxHp:'❤️',runGems:'💎'};

function makeSpecial(type,tier,label){return{id:++rewardSeq,kind:'special',type,tier,good:true,icon:tier==='legendary'?'🌈':'💛',label}}
function randomGood(){let choices=[makeStatReward('atk',2),makeStatReward('gold',Math.round(50*(1+meta.explorer*.05))),makeStatReward('luck',1),makeStatReward('maxHp',10)],heal=Math.min(20,state.maxHp-state.hp);if(heal>0)choices.push(makeStatReward('hp',heal));return choices[Math.floor(Math.random()*choices.length)]}
function randomBad(){if(Math.random()<.18)return{id:++rewardSeq,kind:'special',type:'curse',tier:'bad',good:false,icon:'☠️',label:'☠️ 저주<br>다음 전투 적 공격력 +20%'};let choices=[makeStatReward('hp',-Math.min(15,state.hp),'bad'),makeStatReward('gold',-Math.min(30,state.gold),'bad'),makeStatReward('atk',-Math.min(1,state.atk-3),'bad'),makeStatReward('luck',-Math.min(1,state.luck),'bad')].filter(x=>x.amount!==0);return choices[Math.floor(Math.random()*choices.length)]||makeStatReward('hp',-Math.min(10,state.hp),'bad')}
function jackpotReward(){let heal=state.maxHp-state.hp,choices=[makeStatReward('atk',10,'jackpot','황금 손'),makeStatReward('luck',5,'jackpot','행운 폭발'),makeStatReward('runGems',3,'jackpot','보석 발견'),makeSpecial('double','jackpot','💛 축복<br>5층간 보상 2배'),makeSpecial('revive','jackpot','💛 부활권<br>사망 무효 1회')];if(heal>0)choices.push(makeStatReward('hp',heal,'jackpot','대박 회복',true));return choices[Math.floor(Math.random()*choices.length)]}
function legendaryReward(){let choices=[makeSpecial('god','legendary','🌈 신의 축복<br>체력·공격·행운 강화'),makeSpecial('rewind','legendary','🌈 시간 역행<br>부활권 획득'),makeStatReward('runGems',10,'legendary','황금 광산'),makeSpecial('destiny','legendary','🌈 운명의 왜곡<br>10층간 나쁜 이벤트 없음')];return choices[Math.floor(Math.random()*choices.length)]}
function reward(){let goodChance=.45+Math.min(.25,state.luck*.025)+(state.skills.includes('gambler')?.1:0)+meta.roulette*.01,items=[],specialRoll=Math.random(),specialIndex=Math.floor(Math.random()*5),tier=specialRoll<.003?'legendary':specialRoll<.078?'jackpot':null;for(let i=0;i<5;i++)items.push(i===specialIndex&&tier?(tier==='legendary'?legendaryReward():jackpotReward()):(Math.random()<goodChance?randomGood():randomBad()));state.wheel=items;let html=`<div class="roulette">${items.map((x,i)=>`<div class="slice ${x.tier}" id="s${i}" data-reward-id="${x.id}">${x.label}</div>`).join('')}</div>`;setScene('보상 구역','운명의 룰렛',tier==='legendary'?'🌈 처음 보는 빛이 룰렛을 감쌉니다.':tier==='jackpot'?'💛 대박 칸이 나타났습니다!':'결과를 모두 확인한 뒤 돌릴지 결정하세요.','🎰',[['룰렛을 돌린다',spin,'primary'],['보상을 포기한다',next]],html);if(tier==='legendary'){document.body.classList.add('legendary-alert');tone(880,1.1,'sine',.08);setTimeout(()=>document.body.classList.remove('legendary-alert'),1000)}else if(tier==='jackpot')sfx('legend')}
function applyReward(x){console.log('[ROULETTE]');console.log(`ID: ${x.id}`);console.log(`TYPE: ${x.kind==='stat'?x.stat.toUpperCase():x.type.toUpperCase()}`);console.log(`VALUE: ${x.kind==='stat'?(x.amount>0?'+':'')+x.amount:x.label.replace(/<br>/g,' / ')}`);if(x.kind==='stat'){let before=state[x.stat];state[x.stat]+=x.amount;let after=state[x.stat];console.log('[APPLY]');console.log(`${statNames[x.stat]} ${x.amount>0?'+':''}${x.amount}`);console.log(`${before} → ${after}`);render();if(x.stat==='hp'&&state.hp<=0)gameOver();return{html:`${x.icon} ${statNames[x.stat]} ${x.amount>0?'+':''}${x.amount}<br><span class="result-change">${before} → ${after}</span>`}}let html='';if(x.type==='double'){state.rewardDoubleUntil=state.floor+5;html='💛 앞으로 5층간 모든 보상 2배'}if(x.type==='revive'||x.type==='rewind'){let before=state.rouletteRevives++;html=`${x.icon} 부활권 ${before} → ${state.rouletteRevives}`}if(x.type==='destiny'){state.safeUntil=state.floor+10;html='🌈 앞으로 10층간 나쁜 이벤트 없음'}if(x.type==='god'){let before=`${state.maxHp}/${state.atk}/${state.luck}`;state.maxHp+=50;state.hp+=50;state.atk+=10;state.luck+=5;html=`🌈 최대 체력 +50 · 공격력 +10 · 행운 +5<br><span class="result-change">${before} → ${state.maxHp}/${state.atk}/${state.luck}</span>`}console.log('[APPLY]');console.log(html.replace(/<[^>]+>/g,' '));render();return{html}}
const standardApplyReward=applyReward;applyReward=function(x){if(x.type!=='curse')return standardApplyReward(x);console.log('[ROULETTE]');console.log(`ID: ${x.id}`);console.log('TYPE: CURSE');if(!state.effects.includes('cursed'))state.effects.push('cursed');console.log('[APPLY] 저주: 다음 전투 적 공격력 +20%');render();return{html:'☠️ 저주 획득<br>다음 전투 적 공격력 +20%'}};

function spin(){[...document.querySelectorAll('.slice')].forEach(x=>x.classList.remove('hit'));let idx=Math.floor(Math.random()*state.wheel.length),delay=0,steps=21+idx;noise(.35,.03);for(let i=0;i<steps;i++){delay+=45+Math.pow(i/steps,3)*170;setTimeout(()=>{sfx('roulette');document.querySelectorAll('.slice').forEach(x=>x.classList.remove('hit'));$('s'+(i%5)).classList.add('hit')},delay)}setTimeout(()=>{let selectedEl=$('s'+idx),x=state.wheel[idx];if(+selectedEl.dataset.rewardId!==x.id)throw new Error('룰렛 객체 ID 불일치');let change=applyReward(x);if(!state.alive)return;sfx(x.tier==='legendary'?'legendWin':x.tier==='jackpot'?'jackpot':x.good?'good':'bad');setScene('룰렛 결과','🎰 결과',change.html,x.icon,[['다음 층으로',next,'primary']])},delay+400)}
function merchant(){let stock=[['응급 치료 키트','체력 30 회복',25,()=>healEffect(30)],['단조된 칼날','공격력 +3',55,()=>state.atk+=3],['강철 장갑','방어력 +2',60,()=>state.def+=2],['바람의 신발','회피율 +3%',70,()=>state.dodge+=.03],['정밀 조준기','치명타 확률 +3%',70,()=>state.crit+=.03],['마나 결정','최대 MP +5',65,()=>{state.maxMp+=5;state.mp+=5}],['재생 물약','체력 재생 +1',80,()=>state.regen++],['행운의 부적','행운 +1',45,()=>state.luck++],['패시브 두루마리','무작위 패시브',75,gainSkillDirect],['전투 기술서','무작위 액티브 스킬',90,gainActiveSkillDirect],['보석 주머니','보석 획득',120,()=>addGem(1,'상인 거래')]].sort(()=>Math.random()-.5).slice(0,4);state.stock=stock;merchantView()}

playerAttack=function(){if(state.combatBusy)return;let attackPower=state.atk,w=state.weapon,e=state.enemy;state.combatBusy=true;let targetDodged=(e.name==='그림자 승객'&&Math.random()<.3)||(state.gearEffects?.includes('ironWall')&&Math.random()<.4),multi=1,heal=0,stun=false,critChance=state.crit+state.luck*.01,source='기본 공격';if(state.skills.includes('hunter'))multi*=1+(1-e.hp/e.max)*.45;if(state.skills.includes('bloodFighter'))multi*=1+(1-state.hp/state.maxHp)*.55;if(state.skills.includes('weaponBond')&&w){state.weaponUseCount=(state.weaponUseCount||0)+1;multi*=1+Math.min(.3,state.weaponUseCount*.015)}if(state.skills.includes('dodgeInstinct')&&state.nextAttackBoost){multi*=1.5;state.nextAttackBoost=false}if(state.skills.includes('dodgeCounter')&&state.counterReady){multi*=1.5;state.counterReady=false}if(state.berserkTurns>0){multi*=1.5;state.berserkTurns--}if(state.overclockTurns>0){multi*=1.55;state.overclockTurns--}if(state.resonanceReady&&state.skills.includes('elevatorResonance')){multi*=1.6;stun=true;source='공명 공격';state.resonanceReady=false}if(state.chainCrit){critChance=1;state.chainCrit=false}if(state.skills.includes('lastStrike')&&e.hp/e.max<=.1)critChance=1;if(w?.dur/w?.maxDur<=.1&&state.skills.includes('breakReaction'))critChance+=.25;if(w?.effect==='shadowDagger'&&state.firstAttack){multi*=2;source='뒤치기'}if(w?.effect==='bloodDagger'){heal=.1;if(Math.random()<.3){multi*=1.4;source='혈류 연속 공격'}}if(w?.effect==='riftBlade')multi*=1.25;if(w?.effect==='gravityBlade')stun=Math.random()<.2;if(w?.effect==='crossbow'){if((w.ammo||0)<3){state.combatBusy=false;return toast('석궁 탄약이 부족합니다.')}w.ammo-=3;multi*=2.35;source='석궁 3연발'}if(w?.effect==='spaceCutter'){multi*=2.6;source='공간 절단';state.skipPlayerTurn=1}if(w?.effect==='doomHand'){state.atk+=2;multi*=1.1;source='파멸의 손'}if(w?.effect==='timeBlade')stun=stun||Math.random()<.35;if(w?.effect==='chaosWeapon'){multi*=2;if(Math.random()<.25)damage(Math.max(1,Math.round(state.maxHp*(state.gearEffects?.includes('curseRelease')?.04: ;toast('🗿 생존 본능 토템 발동')},40)}sfx(e.boss?'bossAttack':'enemyAttack');damage(incoming,false);if(!state.alive)return;if(state.reflectDamage){e.hp=Math.max(0,e.hp-state.reflectDamage);addCombatLog(`🛡️ 반사 피해 ${state.reflectDamage}`);state.reflectDamage=0}if(state.gearEffects?.includes('bloodArmor')){state.hp=Math.max(1,state.hp-2);state.atk++;addCombatLog('🩸 피의 갑옷: HP -2 · 공격력 +1')}recoverCombatMp();if(state.regen)state.hp=Math.min(state.maxHp,state.hp+state.regen);state.hitChain=(state.hitChain||0)+1;if(state.skills.includes('reactionAccel')&&state.hitChain>=2){state.shadowGuard=1;state.hitChain=0;addCombatLog('⏱️ 반응 가속 준비')}if(state.hp/state.maxHp<=.3&&state.skills.includes('criticalBurst')&&!state.berserkTurns){state.berserkTurns=5;toast('🔥 체력 임계 폭발')}if(state.hp/state.maxHp<=.15&&state.skills.includes('crisisSlow')&&!state.crisisUsed){state.crisisUsed=true;state.enemyStops=Math.max(1,state.enemyStops);toast('🕰️ 위기 슬로우')}addCombatLog(`${e.name}이(가) ${incoming} 데미지`);combatView(`${e.boss?'보스':'적'} 공격! −${incoming} · 🔷+2`);playerHitFx(incoming);setTimeout(()=>{if(!state.alive)return;state.combatBusy=false;combatView('당신의 차례')},360)};
function bossSkillPattern(e){let odd=e.turn%2===1;if(e.mechanic==='janitor')return odd?{name:'부식성 세척',mult:1.35,heal:.04}:{name:'회전 대걸레',mult:1.65,mp:4};if(e.mechanic==='security')return odd?{name:'진압 방패 강타',mult:1.5,mp:5}:{name:'보안 봉쇄',mult:1.75,guard:1};if(e.mechanic==='inspector')return odd?{name:'약점 감사',mult:1.4,breakDef:e.turn%3===0?1:0}:{name:'징계 처분',mult:1.8,mp:6};if(e.mechanic==='reaper')return e.turn%3===0?{name:'최종 처형',mult:2.35}:{name:e.turn%3===1?'사형 선고':'낫 연무',mult:e.turn%3===1?1.3:1.65};if(e.mechanic==='manager')return e.hp/e.max<=.5?{name:'광폭한 강제 야근',mult:1.95,mp:7}:{name:odd?'서류 폭풍':'인사 평가',mult:odd?1.55:1.7,breakDef:odd?0:1};return{name:'엘리베이터 붕괴',mult:1.6}}
enemyTurn=function(){if(!state.alive||state.enemy.hp<=0)return;let e=state.enemy;e.turn++;if(state.shadowGuard||state.rewindGuard){let label=state.shadowGuard?'그림자 스텝':'리와인드 스텝';state.shadowGuard=0;state.rewindGuard=0;recoverCombatMp();addCombatLog(`${label}: 공격 완전 회피`);combatView(`${label} 성공! · 🔷+2`);return setTimeout(()=>{state.combatBusy=false;combatView('당신의 차례')},260)}let dodgeChance=state.dodge;if(state.weapon?.effect==='gravityBlade')dodgeChance=e.boss?.15:.35;if(Math.random()<dodgeChance){recoverCombatMp();state.nextAttackBoost=true;state.counterReady=true;addCombatLog(`🍃 ${e.name}의 공격 회피 · 다음 공격 강화`);combatView('회피 카운터 준비 · 🔷+2');return setTimeout(()=>{state.combatBusy=false;combatView('당신의 차례')},260)}if(state.skills.includes('surroundSense')&&e.boss&&!state.surroundUsed){state.surroundUsed=true;addCombatLog('👁️ 포위 감지: 보스 기술 밀쳐냄');return setTimeout(()=>{state.combatBusy=false;combatView('포위 감지 발동')},240)}let pattern=e.boss?bossSkillPattern(e):{name:e.turn%3===0?'몬스터 강공격':'흉포한 공격',mult:e.turn%3===0?1.35:1},incoming=Math.round(e.atk*(.9+Math.random()*.25)*pattern.mult);if(pattern.heal){let healed=Math.round(e.max*pattern.heal);e.hp=Math.min(e.max,e.hp+healed);addCombatLog(`${pattern.name}: 체력 ${healed} 회복`)}if(pattern.mp){let lost=Math.min(state.mp,pattern.mp);state.mp-=lost;addCombatLog(`${pattern.name}: MP ${lost} 파괴`)}if(pattern.breakDef){state.def=Math.max(0,state.def-pattern.breakDef);addCombatLog(`${pattern.name}: 방어력 -${pattern.breakDef}`)}if(pattern.guard)e.guard=Math.max(e.guard||0,pattern.guard);if(state.ironSkin>0){incoming=Math.ceil(incoming/2);state.ironSkin--}if(state.vulnerableTurns>0){incoming=Math.ceil(incoming*1.5);state.vulnerableTurns--}if(state.gearEffects?.includes('reflectArmor'))state.reflectDamage=Math.round(incoming*.2);incoming=Math.max(e.boss?3:2,incoming-state.def);if(state.skills.includes('emergencyReflex')&&!state.emergencyUsed&&incoming>=state.hp){state.emergencyUsed=true;addCombatLog('⚡ 긴급 회피 반사: 치명 기술 회피');return setTimeout(()=>{state.combatBusy=false;combatView('긴급 회피 반사 발동')},260)}if(state.gearEffects?.includes('survivalTotem')&&!state.survivalTotemUsed&&state.hp-incoming<=state.maxHp*.1){state.survivalTotemUsed=true;incoming=Math.max(0,state.hp-1);setTimeout(()=>{state.hp=Math.min(state.maxHp,state.hp+Math.round(state.maxHp*.25));render();toast('🗿 생존 본능 토템 발동')},40)}sfx(e.boss?'bossAttack':'enemyAttack');damage(incoming,false);if(!state.alive)return;if(state.reflectDamage){e.hp=Math.max(0,e.hp-state.reflectDamage);addCombatLog(`🛡️ 반사 피해 ${state.reflectDamage}`);state.reflectDamage=0}if(state.gearEffects?.includes('bloodArmor')){state.hp=Math.max(1,state.hp-2);state.atk++;addCombatLog('🩸 피의 갑옷: HP -2 · 공격력 +1')}recoverCombatMp();if(state.regen)state.hp=Math.min(state.maxHp,state.hp+state.regen);state.hitChain=(state.hitChain||0)+1;if(state.skills.includes('reactionAccel')&&state.hitChain>=2){state.shadowGuard=1;state.hitChain=0;addCombatLog('⏱️ 반응 가속 준비')}if(state.hp/state.maxHp<=.3&&state.skills.includes('criticalBurst')&&!state.berserkTurns){state.berserkTurns=5;toast('🔥 체력 임계 폭발')}if(state.hp/state.maxHp<=.15&&state.skills.includes('crisisSlow')&&!state.crisisUsed){state.crisisUsed=true;state.enemyStops=Math.max(1,state.enemyStops);toast('🕰️ 위기 슬로우')}addCombatLog(`${pattern.name}: ${incoming} 데미지`);combatView(`${e.boss?'👑 ':''}${pattern.name}! −${incoming} · 🔷+2`);playerHitFx(incoming);setTimeout(()=>{if(!state.alive)return;state.combatBusy=false;combatView('당신의 차례')},380)};
const triggerWinCombat=winCombat;winCombat=function(){if(state.skills.includes('bloodAbsorb')){state.hp=Math.min(state.maxHp,state.hp+Math.round(state.maxHp*.08));state.mp=Math.min(state.maxMp,state.mp+5)}if(state.gearEffects?.includes('slaughterRing'))state.atk++;state.killChain=(state.killChain||0)+1;if(state.skills.includes('chainExecution')&&state.killChain>=2){state.chainCrit=true;state.killChain=0}triggerWinCombat()};
const expandedMerchant=merchant;merchant=function(){expandedMerchant();if(state.weapon?.effect==='crossbow'){state.stock[0]=['석궁 탄약 상자','탄약 +18',35,()=>{state.weapon.ammo=(state.weapon.ammo||0)+18;toast(`🏹 탄약 ${state.weapon.ammo}발`);render()}];merchantView('연속 석궁용 탄약이 입고되었습니다.')}};
const riskNextCore=next;next=function(){if(state.infectedFloors>0){state.infectedFloors--;damage(Math.max(1,Math.round(state.maxHp*.04)),false);if(!state.alive)return}if(state.elevatorFault){state.elevatorFault=false;if(Math.random()<.5){damage(Math.max(1,Math.round(state.maxHp*.12)),false);if(!state.alive)return}else state.chaserRisk=Math.max(state.chaserRisk||0,.55)}riskNextCore();if(!state.alive)return;if(state.skills.includes('elevatorAdapt')){state.hp=Math.min(state.maxHp,state.hp+Math.max(2,Math.round(state.maxHp*.03)));state.mp=Math.min(state.maxMp,state.mp+3)}if(state.gearEffects?.includes('elevatorCore')){let r=Math.floor(Math.random()*3);if(r===0)state.atk++;if(r===1)state.hp=Math.min(state.maxHp,state.hp+5);if(r===2)state.luck++}state.resonanceReady=true;render()};
const positiveEventPool=normalEvents.slice(),neutralEventPool=extraEvents.slice();
function fakeChestEvent(){if(Math.random()<.5){let w={...weaponTypes.find(x=>x.effect==='chaosWeapon'),name:'상자 속 오염검',atk:Math.round(state.atk*1.15),dur:18,maxDur:18};state.weapon=w;state.atk=w.atk;result('강한 무기를 얻었습니다. 손잡이에서 불길한 맥박이 느껴집니다.')}else result(`상자 깊은 곳에서 보석 ${addGem(4,'봉인된 상자')}개를 발견했습니다.`)}
function scamTrade(){if(!state.weapon)return result('상인은 맨손인 당신을 비웃고 사라졌습니다.');let old=state.weapon.name;if(Math.random()<.55){state.weapon=null;state.atk=Math.max(1,Math.round(state.atk*.45));result(`${old}이(가) 가짜 감정 과정에서 파괴되었습니다.`)}else{state.atk=Math.round(state.atk*1.35);state.maxHp=Math.max(25,state.maxHp-15);result('무기는 강해졌지만 생명력이 깎였습니다. 공격력 +35% · 최대 체력 -15')}}
const negativeEvents=[{t:'금빛 상자',d:'표면은 따뜻하고 잠금장치는 이미 풀려 있습니다.',i:'🎁',c:[['상자를 연다',fakeChestEvent,'primary'],['그대로 둔다',next]]},{t:'정비 완료 표시',d:'제어판에는 모든 항목이 정상이라고 적혀 있습니다.',i:'🛗',c:[['운행을 재개한다',()=>{state.elevatorFault=true;result('정비 표시등이 조용히 꺼졌습니다.')}],['직접 점검한다',()=>result('체력 8을 소모해 고장을 막았습니다.',()=>damage(8,false))]]},{t:'살균 구역',d:'공기는 깨끗하지만 목 안쪽이 따갑습니다.',i:'☣️',c:[['통과한다',()=>{state.infectedFloors=3;result('감염 여부를 확인할 수 없습니다.')}],['우회한다',()=>damage(12)]]},{t:'친절한 감정사',d:'현재 무기를 더 강하게 만들 수 있다고 속삭입니다.',i:'🧑',c:[['무기를 맡긴다',scamTrade,'danger'],['거절한다',next]]},{t:'층간 계약',d:'다음 세 층의 보상이 커진다는 조항만 선명합니다.',i:'📜',c:[['서명한다',()=>{state.effects.push('cursed');state.rewardDoubleUntil=state.floor+3;result('다음 3층 보상 증가 · 다음 전투 강화')}],['찢어버린다',()=>damage(10)]]},{t:'세 갈래 버튼',d:'어느 버튼에도 결과는 적혀 있지 않습니다.',i:'🔘',c:[['지금 누른다',()=>result(`즉시 보석 ${addGem(1,'버튼')}개 획득`)],['예약한다',()=>{state.rewardDoubleUntil=state.floor+5;result('미래 보상이 예약되었습니다.')}],['대가를 낸다',()=>{damage(20,false);addGem(6,'위험 선택');result('체력과 보석을 교환했습니다.')}]]}];
normal=function(){let negativeChance=Math.min(.5,.3+state.floor/1200),roll=Math.random(),pool=roll<negativeChance?negativeEvents:roll<negativeChance+.3?neutralEventPool:positiveEventPool,e=pool[Math.floor(Math.random()*pool.length)];setScene('이벤트 구역',e.t,e.d,e.i,e.c)};
operatorCall=function(){let r=Math.random();if(r<.32)return gainActiveSkillDirect(()=>result('Operator가 전설 기술을 전송했습니다.'),true);if(r<.55)return result(`보석 ${addGem(10,'Operator 보상')}개 획득`);if(r<.78){if(!state.effects.includes('cursed'))state.effects.push('cursed');return result('통화가 끝난 뒤 다음 전투의 적이 강화되었습니다.')}state.maxHp=Math.max(25,state.maxHp-20);result('목소리가 당신의 수명을 가져갔습니다. 최대 체력 -20')};
const navigationHubBase=openHub;openHub=function(){state.codexOrigin='hub';return navigationHubBase()};
const navigationStartBase=startRun;startRun=function(building=state.selectedBuilding||1){state.codexOrigin='elevator';return navigationStartBase(building)};
const navigationCodexBase=openSkillCodex;openSkillCodex=function(){let previous=$('modal').innerHTML,fromHub=state.codexOrigin==='hub';navigationCodexBase();let close=[...$('modal').querySelectorAll('button')].at(-1);if(close){close.textContent=fromHub?'연구소로 돌아가기':'이전 화면으로';close.onclick=()=>{if(fromHub)return openHub();if(previous.trim()){$('modal').innerHTML=previous;$('overlay').classList.add('show')}else closePause()}}};
setTimeout(()=>{if(!state.alive||state.floor===0)openHub()},0);
document.addEventListener('keydown',e=>{if(e.code!=='Backquote')return;e.preventDefault();if(!state.testMode){state.testMode=true;state.testBestBefore=+(localStorage.floorBest||0);toast('TEST MODE 활성화 · 기록 저장 안 함')}state.combatBusy=false;render();if(state.alive&&!$('overlay').classList.contains('show'))next()});
